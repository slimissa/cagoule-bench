name: cagoule-bench CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  schedule:
    # Benchmark quotidien à 02:00 UTC pour détecter les dérives
    - cron: '0 2 * * *'

jobs:
  test:
    name: Tests unitaires
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  benchmark-regression:
    name: Détection de régressions
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Restore baseline (cache)
        uses: actions/cache@v4
        with:
          path: ./benchmark_results/baseline.json
          key: bench-baseline-${{ runner.os }}

      - name: Check if baseline exists
        id: check
        run: |
          if [ -f ./benchmark_results/baseline.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create baseline (first run)
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p ./benchmark_results
          cagoule-bench ci --suite encryption --save-baseline \
            --baseline ./benchmark_results/baseline.json

      - name: Run regression check
        if: steps.check.outputs.exists == 'true'
        run: |
          cagoule-bench ci --suite encryption \
            --baseline ./benchmark_results/baseline.json \
            --threshold -10

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ github.sha }}
          path: ./benchmark_results/
          retention-days: 30

  benchmark-full:
    name: Benchmark complet (toutes suites)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full benchmark
        run: |
          cagoule-bench run --format html --format csv --format json \
            --output ./benchmark_results/full

      - name: Upload full benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: full-benchmark-${{ github.run_id }}
          path: ./benchmark_results/full/
          retention-days: 90